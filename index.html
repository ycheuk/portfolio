<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yik Yin Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Josefin+Sans:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">
    <nav class="header-nav">
        <img src="images/header_bar.png" alt="Header" class="header-bar" />
        <div class="nav-items">
            <img src="images/heart_symbol.png" alt="Heart" class="heart-icon" />
            <a href="#work" class="nav-link">WORK</a>
            <a href="#about" class="nav-link">ABOUT</a>
        </div>
        <div class="nav-items-right">
            <a href="https://www.linkedin.com/in/ycheuk/" target="_blank" class="nav-link">LINKEDIN</a>
            <a href="https://www.behance.net/ycheuk" target="_blank" class="nav-link">BEHANCE</a>
        </div>
    </nav>

    <div class="container">
        <img src="images/yik.png" alt="Yik" class="side left">
        <img src="images/headshot-bottom.png" alt="" class="headshot-bottom">

        <div class="headshot-wrapper" id="headshot-wrapper">
            <img src="images/headshot.png" alt="Headshot" class="center headshot-default" />
              <img src="images/headshot_hover.png" alt="See my works" class="center headshot-hover" />
        </div>

        <img src="images/headshot-top.png" alt="" class="headshot-top">
        <img src="images/yin.png" alt="Yin" class="side right">

        <a href="#work" class="down-arrow-link">
            <img src="images/down_arrow.png" alt="Scroll down" class="down-arrow" />
        </a>
    </div>

    <section id="work" class="work-section">
        <a href="#top" class="work-up-arrow-link">
            <img src="images/up_arrow.png" alt="Scroll up" class="work-up-arrow" />
        </a>

        <div class="showcase-header">
            <img src="images/line_break_left.png" class="line-break-img" alt="" />
            <span class="showcase-title">NOTABLE WORKS</span>
            <img src="images/line_break_right.png" class="line-break-img" alt="" />
        </div>

        <div class="showcase-wrapper">
            <img src="images/left_arrow.png" class="showcase-arrow left-arrow" alt="Previous" />
            <div class="showcase">
                <div class="showcase-item" onclick="showWork('toury_thumbnail')">
                    <img src="images/toury_thumbnail.png" alt="toury_thumbnail" class="showcase-thumb" />
                </div>
                <div class="showcase-item" onclick="showWork('brothers_buffet_thumbnail')">
                    <img src="images/brothers_buffet_thumbnail.png" alt="Brothers Buffet" class="showcase-thumb" />
                </div>
                <div class="showcase-item" onclick="showWork('joshua_trees_thumbnail')">
                    <img src="images/joshua_trees_thumbnail.png" alt="Joshua Trees" class="showcase-thumb" />
                </div>
                <div class="showcase-item" onclick="showWork('reed_college_thumbnail')">
                    <img src="images/reed_college_thumbnail.png" alt="Reed College" class="showcase-thumb" />
                </div>
            </div>
            <img src="images/right_arrow.png" class="showcase-arrow right-arrow" alt="Next" />
        </div>

        <img src="images/line_break.png" class="section-line-break" alt="" />

        <div class="work-detail" id="work-detail">
            <img src="images/toury.png" alt="Selected work" class="detail-image" id="detail-image" />
            <div class="detail-text">
                <p class="detail-title">
                    <span id="detail-title-bold">Smart Tourism Mobile App</span>
                    <span class="detail-title-separator"> • </span>
                    <span id="detail-company" class="detail-company">TouryAI</span>
                </p>
                <p class="detail-desc" id="detail-desc">TouryAI is a smart tourism mobile app designed to make travel smarter, more engaging, and deeply personal.</p>
                <div class="detail-labels-row">
                    <div class="detail-labels" id="detail-labels">
                        <img src="images/label_1.png" class="detail-label" />
                        <img src="images/label_2.png" class="detail-label" />
                        <img src="images/label_3.png" class="detail-label" />
                        <img src="images/label_4.png" class="detail-label" />
                    </div>
                    <div class="detail-successes">
                        <div class="success-item">
                            <p class="success-label">My </p>
                            <p class="success-value">UI Designer</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- update work section down arrow to point to #about -->
        <a href="#about" class="work-down-arrow-link">
            <img src="images/down_arrow.png" alt="Scroll down" class="work-down-arrow" />
        </a>
    </section>

    <!-- ====== ABOUT SECTION ====== -->
    <section id="about" class="about-section">
        <a href="#work" class="about-up-arrow-link">
            <img src="images/up_arrow.png" alt="Scroll up" class="about-up-arrow" />
        </a>

        <!-- ====== ABOUT SLIDES CONTAINER ====== -->
        <div class="about-slides">

            <!-- SLIDE 1 -->
            <div class="about-slide active-slide">
                <div class="about-header">
                    <img src="images/line_break_left.png" class="line-break-img" alt="" />
                    <span class="about-title">ABOUT</span>
                    <img src="images/line_break_right.png" class="line-break-img" alt="" />
                </div>
                <img src="images/about_pictures.png" alt="Me and my parents" class="about-photo" />
                <p class="about-bio-label">BIO</p>
                <img src="images/line_break.png" class="about-line-break" alt="" />
            </div>

            <!-- SLIDE 2 — placeholder -->
            <div class="about-slide">
                <p class="about-slide-placeholder">2nd slide here</p>
            </div>

        </div>
        <!-- ====== END ABOUT SLIDES CONTAINER ====== -->

        <!-- LEFT AND RIGHT ARROWS -->
        <div class="about-arrows">
            <img src="images/left_arrow.png" class="about-side-arrow" alt="Previous" id="about-left-arrow" />
            <img src="images/right_arrow.png" class="about-side-arrow" alt="Next" id="about-right-arrow" />
        </div>

    </section>
    <!-- ====== END ABOUT SECTION ====== -->

    <script>
        // ====== HEADSHOT CLICK SCROLLS TO WORK ======
        document.getElementById('headshot-wrapper').addEventListener('click', () => {
        const target = document.getElementById('work');
        const targetY = target.getBoundingClientRect().top + window.scrollY;
        const startY = window.scrollY;
        const distance = targetY - startY;
        const duration = 1800;
        let startTime = null;
        function ease(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }
        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            window.scrollTo(0, startY + distance * ease(progress));
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
        });
        // ====== END HEADSHOT CLICK SCROLLS TO WORK ======
        const workData = {
            toury_thumbnail: {
                title: 'Smart Tourism Mobile App',
                company: 'TouryAI',
                image: 'images/toury.png',
                desc: 'TouryAI is a smart tourism mobile app designed to make travel smarter, more engaging, and deeply personal. TouryAI\'s mission is to make travel smarter, more engaging, and deeply personal, empowering explorers everywhere to see the world with fresh eyes.',
                labels: ['images/uiux_design_label.png', 'images/b2c_label.png', 'images/mobile_app_design_label.png', 'images/tourism_label.png'],  // ← comma here
                successes: [
                    { label: 'Tools', value: 'Figma, Jira' },
                    { label: 'Contribution', value: 'Team' },
                    { label: 'Scope', value: 'End-to-End' },
                    { label: 'Research', value: 'Usability, A/B' },
                ]
            },
            brothers_buffet_thumbnail: {
                title: 'Local Chinese Dining Website',
                company: 'Brother\'s Buffet',
                image: 'images/brothers_buffet.png',
                desc: 'Brother\'s Buffet is a family-owned American-Chinese buffet restaurant. This website serves as a digital extension of the restaurant, showcasing its menu, business hours, address, pricing, and photo gallery to attract new customers and simplify communication.',
                labels: ['images/ui_design_label.png', 'images/web_development_label.png', 'images/restaurant_website_label.png', 'images/small_business_label.png'],  // ← comma here
                successes: [
                    { label: 'Tools', value: 'Figma, GitHub' },
                    { label: 'Contribution', value: 'Solo' },
                    { label: 'Scope', value: 'End-to-End' },
                    { label: 'Platforms', value: 'Web, Mobile' }
                ]
            },
            joshua_trees_thumbnail: {
                title: 'Conservation Website',
                company: 'Lancaster MOAH',
                image: 'images/joshua_trees.png',
                desc: 'Hey JTree is an interactive website designed to offer connection between people and the Joshua trees of the Mojave Desert. The platform documents individual trees in Joshua Tree National Park and the Prime Desert Woodland Preserve, allowing visitors to explore tree profiles, share their experiences, and build a deeper relationship with nature.',
                labels: ['images/uiux_design_label.png', 'images/web_development_label.png', 'images/enviromental_conservation_label.png'],  // ← comma here
                successes: [
                    { label: 'Tools', value: 'Figma, Wordpress' },
                    { label: 'Contribution', value: 'Solo' },
                    { label: 'Platforms', value: 'Web, Mobile' }
                ]
            },
            reed_college_thumbnail: {
                title: 'Student Government UI Design',
                company: 'Reed College',
                image: 'images/reed_college.png',
                desc: 'The Reed College Student Body Senate is the representative body of the Reed College Student Body for all its legislative, executive, and judicial purposes, and represents the interests of the Student Body to the Faculty, the Administration, and the Trustees of Reed College.',
                labels: ['images/uiux_design_label.png', 'images/web_development_label.png', 'images/institutional_website_label.png'],  // ← comma here
                successes: [
                    { label: 'Tools', value: 'Figma, Wix' },
                    { label: 'Contribution', value: 'Solo' },
                    { label: 'Scope', value: 'End-to-End' },
                    { label: 'Research', value: 'Usability, interviews' }
                ]
            }
        };

        function showWork(key) {
            const detail = document.getElementById('work-detail');
            detail.style.opacity = '0';

            setTimeout(() => {
                const data = workData[key];
                document.getElementById('detail-image').src = data.image;
                document.getElementById('detail-image').alt = data.title;
                document.getElementById('detail-title-bold').textContent = data.title;
                document.getElementById('detail-company').textContent = data.company;
                document.getElementById('detail-desc').textContent = data.desc;

                // Dynamically render labels
                const labelsContainer = document.getElementById('detail-labels');
                labelsContainer.innerHTML = '';
                data.labels.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.classList.add('detail-label');
                    labelsContainer.appendChild(img);
                });

                // Dynamically render successes
                const successesContainer = document.querySelector('.detail-successes');
                successesContainer.innerHTML = '';
                data.successes.forEach(item => {
                    const div = document.createElement('div');
                    div.classList.add('success-item');
                    div.innerHTML = `
                        <p class="success-label">${item.label}</p>
                        <p class="success-value">${item.value}</p>
                    `;
                    successesContainer.appendChild(div);
                });

                document.querySelectorAll('.showcase-item').forEach(item => {
                    item.classList.remove('active');
                });
                document.querySelector(`[onclick="showWork('${key}')"]`).classList.add('active');
                currentIndex = workOrder.indexOf(key);

                detail.style.opacity = '1';
            }, 300);
        }

        // Set default active thumbnail on load
        document.addEventListener('DOMContentLoaded', () => {
            showWork('toury_thumbnail');
        });

        // Smooth scroll to #work
        document.querySelectorAll('a[href="#work"]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.getElementById('work');
                const targetY = target.getBoundingClientRect().top + window.scrollY;
                const startY = window.scrollY;
                const distance = targetY - startY;
                const duration = 1800;
                let startTime = null;
                function ease(t) {
                    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                }
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    window.scrollTo(0, startY + distance * ease(progress));
                    if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        });

        // Smooth scroll to #top (up arrow in work section)
        document.querySelectorAll('a[href="#top"]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const startY = window.scrollY;
                const distance = -startY;  // scroll back to 0
                const duration = 1800;
                let startTime = null;
                function ease(t) {
                    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                }
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    window.scrollTo(0, startY + distance * ease(progress));
                    if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        });

        // ====== ARROW NAVIGATION ======
        // Order of projects — matches left-to-right thumbnail order
        const workOrder = [
            'toury_thumbnail',           // ← now first
            'brothers_buffet_thumbnail',
            'joshua_trees_thumbnail',
            'reed_college_thumbnail'
        ];

        let currentIndex = 0; // ← 0 = toury, now the first item

        document.querySelector('.left-arrow').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                showWork(workOrder[currentIndex]);
            }
        });

        document.querySelector('.right-arrow').addEventListener('click', () => {
            if (currentIndex < workOrder.length - 1) {
                currentIndex++;
                showWork(workOrder[currentIndex]);
            }
        });
        // ====== END ARROW NAVIGATION ======

        // ====== WORK SECTION FADE IN ======
        const workSection = document.getElementById('work');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    workSection.classList.add('visible');
                    observer.unobserve(workSection); // ← stops watching after first trigger
                }
            });
        }, {
            threshold: 0.2,        // ← 20% of section must be visible to trigger
            rootMargin: '0px'      // ← no extra margin, triggers exactly at viewport edge
        });

        observer.observe(workSection);
        // ====== END WORK SECTION FADE IN ======

        // ====== SMOOTH SCROLL TO #about ======
        document.querySelectorAll('a[href="#about"]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.getElementById('about');
                const targetY = target.getBoundingClientRect().top + window.scrollY;
                const startY = window.scrollY;
                const distance = targetY - startY;
                const duration = 1800;
                let startTime = null;
                function ease(t) {
                    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                }
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    window.scrollTo(0, startY + distance * ease(progress));
                    if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        });
        // ====== END SMOOTH SCROLL TO #about ======

        // ====== SMOOTH SCROLL TO #work FROM ABOUT ======
        document.querySelectorAll('a[href="#work"]').forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.getElementById('work');
                const targetY = target.getBoundingClientRect().top + window.scrollY;
                const startY = window.scrollY;
                const distance = targetY - startY;
                const duration = 1800;
                let startTime = null;
                function ease(t) {
                    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                }
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    window.scrollTo(0, startY + distance * ease(progress));
                    if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            });
        });
        // ====== END SMOOTH SCROLL TO #work FROM ABOUT ======

        // ====== ABOUT SLIDESHOW ======
        const aboutSlides = document.querySelectorAll('.about-slide');
        let aboutIndex = 0;

        function showAboutSlide(index) {
            aboutSlides.forEach(slide => slide.classList.remove('active-slide'));
            aboutSlides[index].classList.add('active-slide');
        }

        document.getElementById('about-left-arrow').addEventListener('click', () => {
            if (aboutIndex > 0) {
                aboutIndex--;
                showAboutSlide(aboutIndex);
            }
        });

        document.getElementById('about-right-arrow').addEventListener('click', () => {
            if (aboutIndex < aboutSlides.length - 1) {
                aboutIndex++;
                showAboutSlide(aboutIndex);
            }
        });
        // ====== END ABOUT SLIDESHOW ======
    </script>
</body>
</html>
